<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Search Console (verificación por meta etiqueta / propiedad de prefijo de URL) -->
    <meta name="google-site-verification" content="02Y4b26KI86VgeZEbI9PGqyO1EqNGYiN53IYbEz7xkg" />

    <!-- Default metadata (per-page title/description/canonical/og:* are set in <Seo>) -->
    <meta name="author" content="Santiago Miranda" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b0e14" />

    <!-- Favicon & app icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dox Designs · Santiago Miranda" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:image" content="https://doxdesigns.dev/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Santiago Miranda — Dox Designs" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://doxdesigns.dev/og-image.jpg" />

    <!-- Fonts are self-hosted via @fontsource (imported in src/main.tsx) -->

    <!-- Structured data (Schema.org): negocio de servicios + persona.
         El ProfessionalService es lo que le dice a Google que eres un proveedor
         contratable con zona de cobertura — clave para el resultado local. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "ProfessionalService",
            "@id": "https://doxdesigns.dev/#business",
            "name": "Dox Designs",
            "alternateName": "Dox Designs — Santiago Miranda",
            "description": "Diseño y desarrollo de páginas web, tiendas online y aplicaciones a medida en Cali, Colombia. Sitios rápidos, seguros y responsive.",
            "url": "https://doxdesigns.dev/",
            "image": "https://doxdesigns.dev/og-image.jpg",
            "logo": "https://doxdesigns.dev/favicon-512.png",
            "email": "santiago.miranda.trabajo@gmail.com",
            "telephone": "+57-318-981-9384",
            "priceRange": "$$",
            "currenciesAccepted": "COP, USD",
            "founder": { "@id": "https://doxdesigns.dev/#santiago" },
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Cali",
              "addressRegion": "Valle del Cauca",
              "addressCountry": "CO"
            },
            "areaServed": [
              { "@type": "City", "name": "Cali" },
              { "@type": "Country", "name": "Colombia" }
            ],
            "knowsLanguage": ["es", "en"],
            "hasOfferCatalog": {
              "@type": "OfferCatalog",
              "name": "Servicios de desarrollo y diseño web",
              "itemListElement": [
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Diseño de páginas web para negocios",
                    "description": "Sitios web y landing pages responsive para empresas, consultorios y marcas personales."
                  }
                },
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Tiendas online (e-commerce)",
                    "description": "Tiendas en línea con catálogo de productos, enfocadas en vender."
                  }
                },
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Aplicaciones web a medida",
                    "description": "Sistemas y paneles internos full-stack con .NET, Next.js y SQL Server."
                  }
                },
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Integración de inteligencia artificial",
                    "description": "Chat-bots y asistentes de atención al cliente entrenados para tu negocio."
                  }
                }
              ]
            },
            "sameAs": [
              "https://github.com/Paradoxang",
              "https://instagram.com/paradoxxan",
              "https://www.facebook.com/profile.php?id=61591547326067"
            ]
          },
          {
            "@type": "Person",
            "@id": "https://doxdesigns.dev/#santiago",
            "name": "Santiago Miranda",
            "alternateName": "Dox Designs",
            "url": "https://doxdesigns.dev/",
            "image": "https://doxdesigns.dev/og-image.jpg",
            "jobTitle": "Desarrollador Full-Stack y Diseñador Web",
            "worksFor": { "@id": "https://doxdesigns.dev/#business" },
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Cali",
              "addressCountry": "CO"
            },
            "knowsAbout": [
              "React",
              "Next.js",
              "TypeScript",
              ".NET",
              "Angular",
              "Electron",
              "Diseño web",
              "UI/UX",
              "Ciberseguridad"
            ],
            "sameAs": [
              "https://github.com/Paradoxang",
              "https://instagram.com/paradoxxan",
              "https://www.facebook.com/profile.php?id=61591547326067"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://doxdesigns.dev/#website",
            "url": "https://doxdesigns.dev/",
            "name": "Dox Designs — Santiago Miranda",
            "inLanguage": "es",
            "publisher": { "@id": "https://doxdesigns.dev/#business" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
